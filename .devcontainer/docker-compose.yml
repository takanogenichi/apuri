services:
  al:
    # Android SDK の build-tools（aapt2 等）は公式に Linux x86_64 版のみ提供されるため、
    # Apple Silicon(arm64) でもコンテナを amd64 で動かし、Docker Desktop の Rosetta で
    # エミュレートしてネイティブビルドを成立させる。
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: al
    volumes:
      - ..:/workspace:cached
      # kiro-cli の認証トークン等を永続化（再ビルドでも再ログイン不要）
      - kirocli-data:/home/node/.local/share/kiro-cli
    ports:
      - "${AL_PORT:-40001}:3000"
    environment:
      - NODE_ENV=development
    command: sleep infinity

volumes:
  kirocli-data:
